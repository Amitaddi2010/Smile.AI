services:
  - type: web
    name: smile-ai-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: DATABASE_URL
        fromDatabase:
          name: smile-ai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*" # Update this to your Vercel URL once deployed
  
databases:
  - name: smile-ai-db
    databaseName: smile_ai
    user: smile_admin
    plan: free
